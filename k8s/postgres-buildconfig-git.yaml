apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: postgres-rootless
  labels:
    app: postgres-it
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: postgres-rootless
  labels:
    app: postgres-it
spec:
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/<your-org>/<your-repo>.git
      ref: main
    contextDir: .
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: postgres-rootless:latest
  triggers:
    - type: ConfigChange
    - type: ImageChange